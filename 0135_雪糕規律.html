<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰淇淋規律大挑戰 - K2 邏輯遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fff9e6;
            touch-action: manipulation;
        }

        /* 加大冰淇淋尺寸 */
        .ice-cream-scoop {
            width: 42px;
            height: 42px;
            border-radius: 50% 50% 25% 25%;
            margin: 0 auto;
            position: relative;
            box-shadow: inset -3px -3px rgba(0,0,0,0.1), 2px 2px 5px rgba(0,0,0,0.05);
        }

        .cone {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #d2b48c;
            margin: -5px auto 0;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
        }

        .ice-cream-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
            padding: 5px;
        }

        .floating {
            animation: floating 2s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .stat-card {
            background: white;
            border-radius: 1.25rem;
            padding: 0.75rem 1.25rem;
            box-shadow: 0 4px 10px -1px rgb(0 0 0 / 0.1);
            border: 3px solid #fef3c7;
        }

        /* 滾動條美化 */
        .pattern-scroll::-webkit-scrollbar {
            height: 8px;
        }
        .pattern-scroll::-webkit-scrollbar-thumb {
            background: #fbcfe8;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-[3rem] shadow-2xl p-6 md:p-10 border-[10px] border-yellow-200">
        <!-- 統計數據欄 -->
        <div class="flex justify-between mb-8">
            <div class="stat-card flex items-center gap-3">
                <span class="text-3xl">📝</span>
                <div>
                    <p class="text-xs text-gray-500 font-bold uppercase tracking-wider">已完成</p>
                    <p class="text-2xl font-black text-blue-500"><span id="completed-count">0</span> / 8</p>
                </div>
            </div>
            <div class="stat-card flex items-center gap-3">
                <span class="text-3xl">✅</span>
                <div>
                    <p class="text-xs text-gray-500 font-bold uppercase tracking-wider">答對了</p>
                    <p class="text-2xl font-black text-green-500" id="correct-count">0</p>
                </div>
            </div>
        </div>

        <!-- 標題區 -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-pink-500 mb-3 tracking-tight">🍦 冰淇淋規律大挑戰</h1>
            <p class="text-gray-500 text-xl font-medium">看一看這 8 個大冰淇淋，下一個是什麼？</p>
        </div>

        <!-- 進度條 -->
        <div class="flex items-center gap-4 mb-8">
            <div class="flex-1 bg-gray-100 rounded-full h-5 shadow-inner">
                <div id="progress" class="bg-gradient-to-r from-pink-300 to-green-400 h-5 rounded-full transition-all duration-700 shadow-sm" style="width: 0%"></div>
            </div>
        </div>

        <!-- 題目顯示區 (加大並支持滾動) -->
        <div class="bg-orange-50 rounded-[2rem] p-6 md:p-10 mb-8 border-4 border-dashed border-orange-200">
            <div id="pattern-display" class="pattern-scroll flex justify-start md:justify-center gap-3 md:gap-5 items-end min-h-[160px] overflow-x-auto pb-4">
                <!-- 8個大冰淇淋會在這裡生成 -->
            </div>
            <div class="mt-8 flex justify-center items-center">
                <div class="flex flex-col items-center">
                    <div class="w-16 h-16 border-4 border-dashed border-pink-400 rounded-2xl flex justify-center items-center mb-2 bg-white shadow-sm">
                        <span class="text-3xl font-bold text-pink-400">?</span>
                    </div>
                    <div class="text-sm font-bold text-pink-500 tracking-widest">下一個是？</div>
                </div>
            </div>
        </div>

        <!-- 選項區 (按鈕也加大) -->
        <div class="grid grid-cols-3 gap-6" id="options-container">
            <!-- 選項會在這裡生成 -->
        </div>

        <!-- 提示資訊 -->
        <div class="mt-10 p-5 bg-blue-50 rounded-2xl text-center border border-blue-100">
            <p id="hint-text" class="text-blue-600 text-lg font-medium">💡 欣欣可以用手指摸摸螢幕，一個一個數顏色喔！</p>
        </div>
    </div>

    <!-- 成功畫面 -->
    <div id="success-overlay" class="success-overlay text-center">
        <div class="text-[120px] mb-6 animate-bounce">🎊</div>
        <h2 class="text-7xl font-black text-pink-500 mb-8 tracking-[0.2em] drop-shadow-sm" id="success-text">欣欣叻叻</h2>
        <p class="text-gray-500 mb-10 text-2xl font-medium">答對了！你觀察得好仔細！</p>
        <button onclick="nextLevel()" class="bg-green-500 hover:bg-green-600 text-white text-4xl font-bold py-6 px-16 rounded-full shadow-2xl transform active:scale-95 transition-all">
            下一關 🚀
        </button>
    </div>

    <!-- 完賽畫面 -->
    <div id="finish-overlay" class="success-overlay text-center p-8">
        <div class="text-[150px] mb-8">👑</div>
        <h2 class="text-6xl font-black text-purple-600 mb-6">欣欣超級叻！</h2>
        <div class="bg-white p-8 rounded-3xl shadow-lg border-4 border-purple-100 mb-10">
            <p class="text-2xl text-gray-600 mb-3">挑戰完成總成績：</p>
            <p class="text-5xl font-black text-pink-500">你答對了 <span id="final-correct">0</span> 題！</p>
        </div>
        <button onclick="resetGame()" class="bg-gradient-to-r from-pink-500 to-purple-500 hover:from-pink-600 hover:to-purple-600 text-white text-3xl font-bold py-5 px-12 rounded-full shadow-xl">
            重新挑戰 🍦
        </button>
    </div>

    <script>
        const colors = {
            red: '#ff6b6b',    // 草莓
            yellow: '#ffd43b', // 芒果 (加深一點點)
            brown: '#8b4513',  // 巧克力
            pink: '#ffacb7',   // 櫻桃 (更鮮艷)
            green: '#40c057',  // 薄荷 (更鮮艷)
            orange: '#fd7e14', // 橘子
            purple: '#7950f2'  // 葡萄 (更明顯)
        };

        const levels = [
            { sequence: ['red', 'yellow', 'red', 'yellow', 'red', 'yellow', 'red', 'yellow'], answer: 'red', options: ['red', 'yellow', 'brown'] },
            { sequence: ['brown', 'pink', 'brown', 'pink', 'brown', 'pink', 'brown', 'pink'], answer: 'brown', options: ['pink', 'brown', 'green'] },
            { sequence: ['green', 'pink', 'pink', 'green', 'pink', 'pink', 'green', 'pink'], answer: 'pink', options: ['green', 'pink', 'red'] },
            { sequence: ['red', 'yellow', 'brown', 'red', 'yellow', 'brown', 'red', 'yellow'], answer: 'brown', options: ['red', 'yellow', 'brown'] },
            { sequence: ['orange', 'orange', 'purple', 'orange', 'orange', 'purple', 'orange', 'orange'], answer: 'purple', options: ['orange', 'purple', 'pink'] },
            { sequence: ['purple', 'green', 'pink', 'purple', 'green', 'pink', 'purple', 'green'], answer: 'pink', options: ['purple', 'green', 'pink'] },
            { isDouble: true, sequence: [['red', 'yellow'], ['pink', 'pink'], ['red', 'yellow'], ['pink', 'pink'], ['red', 'yellow'], ['pink', 'pink'], ['red', 'yellow'], ['pink', 'pink']], answer: ['red', 'yellow'], options: [['red', 'yellow'], ['pink', 'pink'], ['yellow', 'red']] },
            { isDouble: true, sequence: [['brown', 'red'], ['orange', 'yellow'], ['brown', 'red'], ['orange', 'yellow'], ['brown', 'red'], ['orange', 'yellow'], ['brown', 'red'], ['orange', 'yellow']], answer: ['brown', 'red'], options: [['brown', 'red'], ['orange', 'yellow'], ['red', 'brown']] }
        ];

        let currentLevelIndex = 0;
        let totalCorrect = 0;
        let hasFailedInCurrentLevel = false;

        // 音效合成器：產生簡單的「喔哦」聲
        const playFailureSound = () => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(200, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.2);
        };

        function speakCantonese(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-HK';
                utterance.rate = 0.85;
                utterance.pitch = 1.25;
                const voices = window.speechSynthesis.getVoices();
                const cantoneseVoice = voices.find(v => v.lang === 'zh-HK' || v.lang.includes('yue'));
                if (cantoneseVoice) utterance.voice = cantoneseVoice;
                window.speechSynthesis.speak(utterance);
            }
        }

        function createIceCream(colorData, isFloating = false) {
            const container = document.createElement('div');
            container.className = `ice-cream-container ${isFloating ? 'floating' : ''}`;

            if (Array.isArray(colorData)) {
                colorData.forEach((c, index) => {
                    const scoop = document.createElement('div');
                    scoop.className = 'ice-cream-scoop';
                    scoop.style.backgroundColor = colors[c] || c;
                    scoop.style.zIndex = 10 - index;
                    if (index > 0) scoop.style.marginTop = '-32px'; // 配合加大尺寸的重疊
                    container.appendChild(scoop);
                });
            } else {
                const scoop = document.createElement('div');
                scoop.className = 'ice-cream-scoop';
                scoop.style.backgroundColor = colors[colorData] || colorData;
                container.appendChild(scoop);
            }

            const cone = document.createElement('div');
            cone.className = 'cone';
            container.appendChild(cone);

            return container;
        }

        function updateStats() {
            document.getElementById('completed-count').innerText = currentLevelIndex;
            document.getElementById('correct-count').innerText = totalCorrect;
            document.getElementById('progress').style.width = `${(currentLevelIndex / levels.length) * 100}%`;
        }

        function loadLevel() {
            hasFailedInCurrentLevel = false;
            const level = levels[currentLevelIndex];
            const display = document.getElementById('pattern-display');
            const options = document.getElementById('options-container');

            updateStats();
            display.innerHTML = '';
            options.innerHTML = '';

            level.sequence.forEach(item => {
                display.appendChild(createIceCream(item));
            });

            level.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "bg-white border-4 border-blue-50 rounded-[2rem] p-6 flex justify-center items-center hover:bg-blue-100 hover:border-blue-200 transform active:scale-95 transition-all shadow-md";
                btn.appendChild(createIceCream(opt, true));
                btn.onclick = () => checkAnswer(opt);
                options.appendChild(btn);
            });

            // 自動滾動到最前
            display.scrollLeft = 0;
        }

        function checkAnswer(selected) {
            const level = levels[currentLevelIndex];
            let isCorrect = false;

            if (level.isDouble) {
                isCorrect = JSON.stringify(selected) === JSON.stringify(level.answer);
            } else {
                isCorrect = selected === level.answer;
            }

            if (isCorrect) {
                if (!hasFailedInCurrentLevel) {
                    totalCorrect++;
                }
                document.getElementById('success-overlay').style.display = 'flex';
                speakCantonese("欣欣叻叻");
            } else {
                hasFailedInCurrentLevel = true;
                const optionsBox = document.getElementById('options-container');
                optionsBox.classList.add('animate-shake');
                setTimeout(() => optionsBox.classList.remove('animate-shake'), 400);

                // 播放失敗音效並讀出鼓勵的話
                playFailureSound();
                speakCantonese("唔緊要，再試一次啦！");
            }
        }

        function nextLevel() {
            document.getElementById('success-overlay').style.display = 'none';
            currentLevelIndex++;
            if (currentLevelIndex < levels.length) {
                loadLevel();
            } else {
                updateStats();
                document.getElementById('final-correct').innerText = totalCorrect;
                document.getElementById('finish-overlay').style.display = 'flex';
                speakCantonese(`欣欣超級叻！你全部做完喇，答對咗${totalCorrect}題！`);
            }
        }

        function resetGame() {
            currentLevelIndex = 0;
            totalCorrect = 0;
            document.getElementById('finish-overlay').style.display = 'none';
            loadLevel();
        }

        // 加入震動動畫樣式
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
            .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        `;
        document.head.appendChild(style);

        window.speechSynthesis.getVoices();
        window.onload = loadLevel;
    </script>
</body>
</html>
