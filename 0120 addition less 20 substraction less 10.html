<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎈 欣欣學加減數 · 加法≤20 · 減法≤10 🎈</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: linear-gradient(145deg, #fce4ec 0%, #ffe0f0 100%);
            color: #333;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
        }

        h1 {
            color: #ff4757;
            font-size: 2.8rem;
            margin: 5px 0 5px;
            text-shadow: 3px 3px #ffeaa7;
            letter-spacing: 2px;
        }

        #game-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            padding: 25px 20px 30px;
            border-radius: 48px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.15);
            max-width: 550px;
            width: 90%;
            display: none;
            border: 3px solid #ffb8c6;
        }

        #start-screen {
            background: white;
            padding: 40px 30px;
            border-radius: 60px;
            box-shadow: 0 20px 30px rgba(255, 71, 87, 0.2);
            border: 4px solid #ffa502;
        }

        .progress-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff0f5;
            padding: 8px 18px;
            border-radius: 60px;
            margin: 5px 0 15px;
            border: 2px dashed #ff9ff3;
            font-weight: bold;
            font-size: 1.4rem;
            color: #c44569;
        }

        .counter-box {
            background: #feca57;
            padding: 6px 18px;
            border-radius: 40px;
            color: #2f3542;
            box-shadow: inset 0 -3px 0 #ff9f43;
        }

        .next-reward {
            background: #dfe6e9;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 1.1rem;
            color: #2d3436;
        }

        .question-box {
            font-size: 6rem;
            font-weight: 900;
            color: #2ed573;
            margin: 10px 0 15px;
            text-shadow: 5px 5px 0 #c8f7c5;
            letter-spacing: 8px;
            background: #f1f2f6;
            border-radius: 70px;
            padding: 10px 10px;
        }

        .options {
            display: flex;
            justify-content: space-around;
            gap: 10px;
            margin: 15px 0 10px;
        }

        .option-btn {
            background-color: #70a1ff;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 3.5rem;
            width: 100px;
            height: 100px;
            cursor: pointer;
            box-shadow: 0 8px 0 #1e90ff;
            transition: all 0.08s;
            font-weight: bold;
            border: 3px solid white;
        }

        .option-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #1e90ff;
        }

        .audio-btn, .start-btn {
            background-color: #ffa502;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.6rem;
            font-weight: bold;
            padding: 12px 28px;
            cursor: pointer;
            box-shadow: 0 6px 0 #e67e22;
            margin: 5px 0;
            border: 2px solid #fff200;
            transition: 0.08s;
        }

        .audio-btn:active, .start-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #e67e22;
        }

        #banner {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 240, 245, 0.96);
            backdrop-filter: blur(5px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .banner-text {
            font-size: 7rem;
            color: #ff4757;
            font-weight: bold;
            animation: bounceIn 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
            text-shadow: 6px 6px 0 #ffeaa7;
        }

        .stars {
            font-size: 5rem;
            margin-top: 20px;
            animation: spin 2s linear infinite;
        }

        #reward-banner {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #f6e58d, #ffb8b8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            backdrop-filter: blur(8px);
        }

        .reward-text {
            font-size: 5.5rem;
            font-weight: 900;
            color: #b71540;
            text-shadow: 5px 5px 0 #f8c291;
            animation: popReward 0.8s ease-out forwards;
            background: rgba(255,255,240,0.5);
            padding: 20px 40px;
            border-radius: 120px;
            border: 6px solid gold;
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
        }

        .reward-sub {
            font-size: 2.8rem;
            margin: 20px 0;
            color: #2c3e50;
            font-weight: bold;
            animation: float 1.2s infinite alternate;
        }

        .reward-stars {
            font-size: 6rem;
            display: flex;
            gap: 30px;
        }

        @keyframes popReward {
            0% { transform: scale(0.2) rotate(-10deg); opacity: 0; }
            80% { transform: scale(1.1) rotate(2deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        @keyframes float {
            from { transform: translateY(0px); }
            to { transform: translateY(-15px); }
        }

        @keyframes bounceIn {
            0% { transform: scale(0.1); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .shake {
            animation: shake 0.3s;
            background-color: #ff6b81 !important;
            box-shadow: 0 8px 0 #c0392b !important;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        #confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1002;
            display: none;
        }

        .start-btn {
            font-size: 2rem;
            padding: 18px 40px;
            background: #ff9f43;
            box-shadow: 0 9px 0 #d35400;
        }

        .footer-note {
            margin-top: 5px;
            color: #e84393;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <!-- 开始画面 -->
    <div id="start-screen">
        <h1>🧸 欣欣學加減數</h1>
        <p style="font-size: 1.6rem; color: #6c5ce7;">➕ 加法 ≤ 20 &nbsp; | &nbsp; ➖ 減法 ≤ 10</p>
        <p style="font-size: 1.4rem; color: #e84393;">⭐ 每20題有驚喜動畫 ⭐</p>
        <button class="start-btn" onclick="startGame()">🎯 開始遊戲 🎯</button>
    </div>

    <!-- 主要游戏区 -->
    <div id="game-container">
        <h1>✨ 欣欣學加減 ✨</h1>
        
        <div class="progress-area">
            <span class="counter-box">✅ 完成: <span id="question-counter">0</span> 題</span>
            <span class="next-reward">🎁 下個獎勵: <span id="next-milestone">20</span></span>
        </div>

        <button class="audio-btn" onclick="speakQuestion()">🔊 聽讀音 (粵+英)</button>
        <div class="question-box" id="question-display"></div>
        <div class="options" id="options-container"></div>
        <div class="footer-note">㊗️ 撳答案啦～</div>
    </div>

    <!-- 普通答对横幅 -->
    <div id="banner">
        <div class="banner-text">欣欣叻叻</div>
        <div class="stars">🌟👧🏻🌟</div>
    </div>

    <!-- 20题奖励专属动画横幅 -->
    <div id="reward-banner">
        <div class="reward-text">🎉 20題達成 🎉</div>
        <div class="reward-sub">欣欣好犀利呀！</div>
        <div class="reward-stars">
            <span>🏆</span><span>🌟</span><span>👑</span><span>🌟</span><span>🏆</span>
        </div>
        <div style="margin-top: 30px; font-size: 2.2rem; color:#2c3e50;">繼續加油～</div>
    </div>

    <!-- 彩带动画canvas -->
    <canvas id="confetti-canvas"></canvas>

    <script>
        (function(){
            // ---------- 游戏状态 ----------
            let currentA = 0;
            let currentB = 0;
            let currentOperator = '+';
            let correctAnswer = 0;
            let isProcessing = false;

            let correctCount = 0;
            const MILESTONE = 20;   

            // DOM 元素
            const startScreen = document.getElementById('start-screen');
            const gameContainer = document.getElementById('game-container');
            const questionDisplay = document.getElementById('question-display');
            const optionsContainer = document.getElementById('options-container');
            const banner = document.getElementById('banner');
            const rewardBanner = document.getElementById('reward-banner');
            const counterSpan = document.getElementById('question-counter');
            const nextMilestoneSpan = document.getElementById('next-milestone');
            const confettiCanvas = document.getElementById('confetti-canvas');
            let ctx = confettiCanvas.getContext('2d');

            let animationId = null;
            let particles = [];

            // ---------- 更新计数器显示 ----------
            function updateCounterUI() {
                counterSpan.textContent = correctCount;
                let next = Math.ceil(correctCount / MILESTONE) * MILESTONE;
                if (correctCount % MILESTONE === 0 && correctCount > 0) {
                    next = correctCount + MILESTONE;
                }
                nextMilestoneSpan.textContent = next;
            }

            // ---------- 开始游戏 ----------
            window.startGame = function() {
                correctCount = 0;
                updateCounterUI();
                
                startScreen.style.display = 'none';
                gameContainer.style.display = 'block';
                banner.style.display = 'none';
                rewardBanner.style.display = 'none';
                stopConfetti(); 
                
                nextQuestion();
            };

            // ---------- 生成下一题 (加法 ≤20，减法 ≤10) ----------
            function nextQuestion() {
                isProcessing = false;
                
                let isAddition = Math.random() > 0.5;

                if (isAddition) {
                    // 加法：结果在20以内，且两个数非负
                    currentOperator = '+';
                    // 第一个加数0~20
                    currentA = Math.floor(Math.random() * 21); 
                    // 第二个加数保证和≤20
                    let maxB = 20 - currentA;
                    currentB = Math.floor(Math.random() * (maxB + 1));
                    correctAnswer = currentA + currentB;
                } else {
                    // 减法：保持10以内，被减数0~10，减数≤被减数
                    currentOperator = '-';
                    currentA = Math.floor(Math.random() * 11);
                    currentB = Math.floor(Math.random() * (currentA + 1));
                    correctAnswer = currentA - currentB;
                }

                questionDisplay.innerText = `${currentA} ${currentOperator} ${currentB} = ?`;
                generateOptions();

                setTimeout(() => {
                    if (!isProcessing) speakQuestion();
                }, 300);
            }

            // 产生3个选项 (正确 + 2个错误，范围0~20，因为加法最大20)
            function generateOptions() {
                let options = [correctAnswer];
                // 错误选项范围0~20，避免无限循环
                while (options.length < 3) {
                    let wrong = Math.floor(Math.random() * 21); // 0~20
                    if (!options.includes(wrong)) options.push(wrong);
                }
                // 洗牌
                options.sort(() => Math.random() - 0.5);

                optionsContainer.innerHTML = '';
                options.forEach(opt => {
                    let btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = (e) => checkAnswer(opt, btn);
                    optionsContainer.appendChild(btn);
                });
            }

            // ---------- 语音：粤语 + 英式英语 ----------
            window.speakQuestion = function() {
                if (isProcessing) return;
                window.speechSynthesis.cancel();

                let cantoOp = currentOperator === '+' ? '加' : '減';
                let cantoText = `${currentA} ${cantoOp} ${currentB} 等於幾多？`;
                let cantoUtter = new SpeechSynthesisUtterance(cantoText);
                cantoUtter.lang = 'zh-HK';
                cantoUtter.rate = 0.85;

                let engOp = currentOperator === '+' ? 'plus' : 'minus';
                let engText = `What is ${currentA} ${engOp} ${currentB}?`;
                let engUtter = new SpeechSynthesisUtterance(engText);
                engUtter.lang = 'en-GB';
                engUtter.rate = 0.85;

                window.speechSynthesis.speak(cantoUtter);
                window.speechSynthesis.speak(engUtter);
            };

            // ---------- 检查答案 ----------
            function checkAnswer(selected, buttonElement) {
                if (isProcessing) return;

                if (selected === correctAnswer) {
                    isProcessing = true;
                    
                    correctCount++;
                    updateCounterUI();

                    if (correctCount % MILESTONE === 0 && correctCount > 0) {
                        showRewardAnimation();
                    } else {
                        showSuccessBanner();
                    }
                } else {
                    buttonElement.classList.add('shake');
                    setTimeout(() => buttonElement.classList.remove('shake'), 350);
                }
            }

            // ---------- 普通成功横幅 ----------
            function showSuccessBanner() {
                window.speechSynthesis.cancel();
                
                banner.style.display = 'flex';
                
                let successUtter = new SpeechSynthesisUtterance("欣欣叻叻！");
                successUtter.lang = 'zh-HK';
                successUtter.rate = 0.9;
                window.speechSynthesis.speak(successUtter);

                setTimeout(() => {
                    banner.style.display = 'none';
                    nextQuestion();
                }, 2800);
            }

            // ---------- 精彩奖励动画 (20题倍数) ----------
            function showRewardAnimation() {
                window.speechSynthesis.cancel();
                
                rewardBanner.style.display = 'flex';
                startConfetti();

                let rewardUtter = new SpeechSynthesisUtterance("好犀利！你已經完成二十題啦！繼續加油！");
                rewardUtter.lang = 'zh-HK';
                rewardUtter.rate = 0.9;
                window.speechSynthesis.speak(rewardUtter);

                setTimeout(() => {
                    rewardBanner.style.display = 'none';
                    stopConfetti();
                    nextQuestion();
                }, 3800);
            }

            // ---------- 彩带特效 ----------
            function startConfetti() {
                confettiCanvas.style.display = 'block';
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
                
                particles = [];
                for (let i = 0; i < 140; i++) {
                    particles.push({
                        x: Math.random() * confettiCanvas.width,
                        y: Math.random() * confettiCanvas.height * 0.2 - 50,
                        size: Math.random() * 12 + 6,
                        speedY: Math.random() * 6 + 4,
                        speedX: (Math.random() - 0.5) * 3,
                        color: `hsl(${Math.random() * 360}, 90%, 60%)`,
                        rotation: Math.random() * 360,
                        rotationSpeed: (Math.random() - 0.5) * 8
                    });
                }
                
                function draw() {
                    if (!confettiCanvas || confettiCanvas.style.display === 'none') return;
                    
                    ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
                    
                    let stillActive = false;
                    for (let p of particles) {
                        p.y += p.speedY;
                        p.x += p.speedX;
                        p.rotation += p.rotationSpeed;
                        
                        if (p.y > confettiCanvas.height + 50) {
                            p.y = -30;
                            p.x = Math.random() * confettiCanvas.width;
                        }
                        if (p.x < -50) p.x = confettiCanvas.width + 20;
                        if (p.x > confettiCanvas.width + 50) p.x = -20;
                        
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rotation * Math.PI / 180);
                        ctx.fillStyle = p.color;
                        ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/1.8);
                        ctx.restore();
                        
                        stillActive = true;
                    }
                    
                    if (stillActive) {
                        animationId = requestAnimationFrame(draw);
                    }
                }
                
                animationId = requestAnimationFrame(draw);
            }

            function stopConfetti() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                confettiCanvas.style.display = 'none';
                ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
                window.removeEventListener('resize', resizeCanvas);
            }

            function resizeCanvas() {
                confettiCanvas.width = window.innerWidth;
                confettiCanvas.height = window.innerHeight;
            }

            window.addEventListener('beforeunload', function() {
                if (animationId) cancelAnimationFrame(animationId);
            });

            stopConfetti();
            updateCounterUI();
        })();
    </script>
</body>
</html>
