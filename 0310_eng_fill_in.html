<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>欣欣填空樂園 · 雙語發音｜2-3字母填空 (森綠版)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            min-height: 100vh;

        .preset-title {

        .group-buttons {

        .group-manager {

        .manager-header {

        .group-list {

        .group-item {

        .group-actions button {

        .group-actions button:active {

        .edit-group {

        .del-group {

        .add-group-form {

        .example-hint {

        /* 遊戲區 */
        .game-play-area {

        .spelling-input {

        /* 提示 toast */
        .hint-toast {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);

            color: #3d6b2e;
            padding: 12px 25px;

            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }

            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }

        .banner-popup {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);

            padding: 20px 35px;

            border: 5px solid #b3d68b;

            animation: bouncePop 0.3s ease;
        }

        @keyframes bouncePop {
            0% { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
            80% { transform: translate(-50%, -50%) scale(1.05);}
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1;}

        .rainbow-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(200, 230, 200, 0.96);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(6px);
            text-align: center;
        }

        .rainbow-text {
            background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
            -webkit-background-clip: text;
            background-clip: text;

            font-size: 0.75rem;

        /* 導入導出按鈕組 */
        .import-export-bar {
            display: flex;
            justify-content: flex-end;

        }

            border: none;
            padding: 6px 16px;

<body>
<div class="game-container" id="gameApp">
    <div class="game-header">
        <h1>🌿 欣欣字母填空樂園 🌿</h1>
        <p>✨ 英式英語 + 粵語解釋 · 2~3個字母空缺 ✨</p>
    </div>
    <div class="game-content" id="dynamicContent"></div>
    <footer>💚 爸爸媽媽哥哥愛欣欣 · 綠意盎然 · 空格唔會變填空 💚</footer>
</div>

<script>
    (function(){
        "use strict";

        // ---------- 全域變數 ----------
        let groups = [];          
        let wordListGlobal = [];            
        let currentWordIndex = 0;
        let currentStage = 'setup';   
        let currentMissingPattern = null;
        let gameActive = false;
        let meaningCache = new Map();
        let currentWordObjForHint = null;

        const contentDiv = document.getElementById('dynamicContent');

        // ---------- 本地儲存 ----------
        function loadGroupsFromStorage() {
            const stored = localStorage.getItem('xinxiang_fill_groups_v2');
            if (stored) {
                try { groups = JSON.parse(stored); if (!Array.isArray(groups)) groups = []; } 
                catch(e) { groups = []; }
            }
            if (!groups || groups.length === 0) {
                groups = [
                    { id: Date.now() + 1, name: "🐶 可愛動物", wordsString: "cat, dog, bird, fish" },
                    { id: Date.now() + 2, name: "🌞 日常句子", wordsString: "I love you, good morning, happy day" },
                    { id: Date.now() + 3, name: "😊 快樂情緒", wordsString: "happy, sad, funny, kind" }
                ];
                saveGroupsToStorage();
            }
        }

        function saveGroupsToStorage() {
            localStorage.setItem('xinxiang_fill_groups_v2', JSON.stringify(groups));
        }

        function addGroup(name, wordsString) {
            if (!name.trim()) name = "欣欣組";
            groups.push({ id: Date.now(), name: name.trim(), wordsString: wordsString.trim() });
            saveGroupsToStorage();
        }

        function updateGroup(id, newName, newWordsString) {
            const idx = groups.findIndex(g => g.id == id);
            if (idx !== -1) {
                groups[idx].name = newName.trim();
                groups[idx].wordsString = newWordsString.trim();
                saveGroupsToStorage();
            }
        }

        function deleteGroup(id) {
            groups = groups.filter(g => g.id != id);
            saveGroupsToStorage();
        }

        // ---------- 導入 / 匯出 JSON ----------
        function exportGroupsToJSON() {
            const dataStr = JSON.stringify(groups, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `xinxiang_groups_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importGroupsFromJSON(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) throw new Error('格式必須是陣列');
                    // 簡單驗證每個物件
                    for (let g of imported) {
                        if (typeof g.id !== 'number' || typeof g.name !== 'string' || typeof g.wordsString !== 'string') {
                            throw new Error('組別資料缺少必要欄位 (id, name, wordsString)');
                        }
                    }
                    groups = imported;
                    saveGroupsToStorage();
                    // 保留目前輸入框文字
                    const currentInput = document.getElementById('wordListInput')?.value || '';
                    renderSetupPage(currentInput);
                    showHintMessage('✅ 匯入成功！');
                } catch (err) {
                    alert('❌ 匯入失敗：檔案格式不正確。\n' + err.message);
                }
            };
            reader.readAsText(file);
        }

        // 觸發檔案選擇
        function triggerImportFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json,application/json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                importGroupsFromJSON(file);
            };
            input.click();
        }

        // ---------- 語音 (英式英語 + 粵語) ----------
        function speakBritishEnglish(text) {
            return new Promise((resolve) => {
                if (!window.speechSynthesis) { resolve(); return; }
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-GB';
                utterance.rate = 0.9;
                utterance.onend = () => resolve();
                utterance.onerror = () => resolve();
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            });
        }

        function speakCantonese(text) {
            return new Promise((resolve) => {
                if (!window.speechSynthesis) { resolve(); return; }
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-HK';
                utterance.rate = 0.9;
                utterance.onend = () => resolve();
                utterance.onerror = () => resolve();
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            });
        }

        async function speakBoth(englishText, cantoneseText) {
            await speakBritishEnglish(englishText);
            await speakCantonese(cantoneseText);
        }

        function showHintMessage(msg) {
            const toast = document.createElement('div');
            toast.className = 'hint-toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        async function showXinXinSuccess(word) {
            return new Promise(async (resolve) => {
                const banner = document.createElement('div');
                banner.className = 'banner-popup';
                banner.innerText = `🎉 欣欣叻叻！ ${word} 🎉`;
                document.body.appendChild(banner);
                await speakCantonese('欣欣叻叻');
                banner.remove();
                resolve();
            });
        }

        async function showRainbowComplete(originalInput) {
            const rainbowDiv = document.createElement('div');
            rainbowDiv.className = 'rainbow-banner';
            rainbowDiv.innerHTML = `
                <div class="rainbow-text">🌈🌈🌈🌈🌈🌈🌈</div>
                <div style="background:white; padding:20px 35px; border-radius:70px; margin:20px;">🎉 欣欣好叻，全部完成！爸爸媽媽哥哥愛欣欣! 🎉</div>
                <div class="rainbow-text">🌈🌈🌈🌈🌈🌈🌈</div>
                <button id="closeRainbowBtn" style="margin-top:30px; background:#6da57e; border:none; font-size:1.4rem; padding:12px 28px; border-radius:50px; color:white;">💖 繼續玩新字 💖</button>
            `;
            document.body.appendChild(rainbowDiv);
            await speakCantonese('欣欣好叻，爸爸媽媽哥哥愛欣欣');
            document.getElementById('closeRainbowBtn').addEventListener('click', () => {
                rainbowDiv.remove();
                gameActive = false;
                currentStage = 'setup';
                renderSetupPage(originalInput || '');
            });
        }

        async function fetchChineseMeaning(text) {
            if (meaningCache.has(text)) return meaningCache.get(text);
            try {
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|zh-TW`;
                const res = await fetch(url);
                const data = await res.json();
                let translated = data?.responseData?.translatedText;
                if (!translated || translated === text) translated = "✨ 可愛短語 ✨";
                translated = translated.replace(/&#39;/g, "'");
                meaningCache.set(text, translated);
                return translated;
            } catch (e) {
                return "⭐ 快樂學習 ⭐";
            }
        }

        // ---------- 核心填空 ----------
        function generateTwoMissingPatterns(originalStr) {
            const letterIndices = [];
            for (let i = 0; i < originalStr.length; i++) {
                if (/[a-zA-Z]/.test(originalStr[i])) letterIndices.push(i);
            }
            const totalLetters = letterIndices.length;
            if (totalLetters === 0) {
                return [{
                    patternText: originalStr,
                    boxes: [],
                    fullWord: originalStr
                }, {
                    patternText: originalStr,
                    boxes: [],
                    fullWord: originalStr
                }];
            }

            function getMissingCount() {
                let maxMissing = Math.min(3, totalLetters - 1);
                if (maxMissing < 2) maxMissing = Math.min(totalLetters, 2);
                let minMissing = 2;
                if (totalLetters <= 2) minMissing = 1;
                const count = Math.floor(Math.random() * (maxMissing - minMissing + 1)) + minMissing;
                return Math.min(count, totalLetters - 1);
            }

            const count1 = getMissingCount();
            let count2 = getMissingCount();
            const pattern1 = createMissingPattern(originalStr, letterIndices, count1);
            let pattern2 = createMissingPattern(originalStr, letterIndices, count2, pattern1.boxes.map(b => b.index));
            
            if (totalLetters >= 3 && JSON.stringify(pattern1.boxes.map(b=>b.index)) === JSON.stringify(pattern2.boxes.map(b=>b.index))) {
                pattern2 = createMissingPattern(originalStr, letterIndices, count2, pattern1.boxes.map(b => b.index));
            }
            return [pattern1, pattern2];
        }

        function createMissingPattern(originalStr, letterIndices, missingCount, avoidIndices = []) {
            let available = letterIndices.filter(idx => !avoidIndices.includes(idx));
            if (available.length < missingCount) available = [...letterIndices];
            for (let i = available.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [available[i], available[j]] = [available[j], available[i]];
            }
            const selectedIndices = available.slice(0, missingCount).sort((a,b)=>a-b);
            
            let patternChars = [];
            let boxesInfo = [];
            for (let i = 0; i < originalStr.length; i++) {
                const ch = originalStr[i];
                if (selectedIndices.includes(i) && /[a-zA-Z]/.test(ch)) {
                    patternChars.push('□');
                    boxesInfo.push({ index: i, correctLetter: ch.toLowerCase() });
                } else {
                    patternChars.push(ch);
                }
            }
            return {
                patternText: patternChars.join(''),
                boxes: boxesInfo,
                fullWord: originalStr
            };
        }

        // ---------- 提示 ----------
        function handleHint() {
            if (!gameActive) return;
            if (currentStage === 'spelling') {
                if (currentWordObjForHint) {
                    const word = currentWordObjForHint.word;
                    const firstLetter = word.charAt(0).toUpperCase();
                    showHintMessage(`💡 提示：第一個字母係「${firstLetter}」，共有 ${word.length} 個字元～`);
                }
            } 
            else if (currentStage === 'missing1' || currentStage === 'missing2') {
                const boxes = document.querySelectorAll('.missing-letter-box');
                if (!boxes.length || !currentMissingPattern) return;
                const correctMap = currentMissingPattern.boxes.map((box, idx) => ({ idx, letter: box.correctLetter.toLowerCase() }));
                let filled = false;
                for (let i = 0; i < boxes.length; i++) {
                    const input = boxes[i];
                    if (input.value.trim() === '') {
                        const correctLetter = correctMap[i]?.letter || '';
                        if (correctLetter) {
                            input.value = correctLetter;
                            input.dispatchEvent(new Event('input', { bubbles: true }));
                            showHintMessage(`✨ 幫你填上第 ${i+1} 個空格：${correctLetter} ✨`);
                            filled = true;
                            break;
                        }
                    }
                }
                if (!filled) {
                    for (let i = 0; i < boxes.length; i++) {
                        const input = boxes[i];
                        const val = input.value.trim().toLowerCase();
                        const correct = correctMap[i]?.letter || '';
                        if (val !== correct && correct) {
                            input.value = correct;
                            input.dispatchEvent(new Event('input', { bubbles: true }));
                            showHintMessage(`🔍 第 ${i+1} 格修正為「${correct}」`);
                            break;
                        }
                    }
                }
            }
        }

        // ---------- 遊戲流程 ----------
        async function startGame(wordsParam = null) {
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            gameActive = false;
            currentStage = 'setup';
            let rawWords = [], wordsString = '';
            if (wordsParam && typeof wordsParam === 'string' && wordsParam.trim() !== '') {
                wordsString = wordsParam;
                rawWords = wordsString.split(',').map(w => w.trim()).filter(w => w.length > 0);
            } else {
                const inputField = document.getElementById('wordListInput');
                if (!inputField) return;
                wordsString = inputField.value.trim();
                if (!wordsString) { alert("請輸入英文單字或句子，用逗號分開～ 💚"); return; }
                rawWords = wordsString.split(',').map(w => w.trim()).filter(w => w.length > 0);
            }
            if (rawWords.length === 0) { alert("請輸入至少一個項目～"); return; }
            rawWords = [...new Set(rawWords)];
            
            wordListGlobal = [];
            for (let phrase of rawWords) {
                const meaning = await fetchChineseMeaning(phrase);
                const patterns = generateTwoMissingPatterns(phrase);
                wordListGlobal.push({ word: phrase, meaning, missingPatterns: patterns });
            }
            currentWordIndex = 0;
            gameActive = true;
            currentStage = 'spelling';
            await renderSpellingStage();
        }

        async function renderSpellingStage() {
            if (!gameActive || currentWordIndex >= wordListGlobal.length) {
                await finishAllWords();
                return;
            }
            currentWordObjForHint = wordListGlobal[currentWordIndex];
            const wordObj = currentWordObjForHint;
            const currentPhrase = wordObj.word;
            const meaning = wordObj.meaning;

            contentDiv.innerHTML = `
                <div class="game-play-area">
                    <div class="progress-info">🌱 第 ${currentWordIndex+1} / ${wordListGlobal.length} 項 🌱</div>
                    <div class="word-card">
                        <div class="eng-word">${escapeHtml(currentPhrase)}</div>
                        <div class="chinese-meaning">${escapeHtml(meaning)}</div>
                        <div class="action-buttons">
                            <button class="sound-btn" id="repeatSoundBtn">🔊 聽多次發音 (英＋粵)</button>
                            <button class="hint-btn" id="hintBtn">💡 提示一下</button>
                        </div>
                        <input type="text" id="spellInput" class="spelling-input" placeholder="輸入完整內容 (大小寫不拘)" autocomplete="off" autofocus>
                    </div>
                    <div style="margin-top:20px;"><button id="resetGameBtn" style="background:#a0d2aa;">🏠 重新輸入</button></div>
                </div>
            `;

            await speakBoth(currentPhrase, meaning);

            document.getElementById('repeatSoundBtn')?.addEventListener('click', async () => {
                await speakBoth(currentPhrase, meaning);
            });
            document.getElementById('hintBtn')?.addEventListener('click', () => handleHint());
            document.getElementById('resetGameBtn')?.addEventListener('click', () => resetToSetup());

            const inputEl = document.getElementById('spellInput');
            if (inputEl) {
                inputEl.focus();
                const handler = async function onInput(e) {
                    const val = e.target.value.trim();
                    if (val.toLowerCase() === currentPhrase.toLowerCase()) {
                        inputEl.removeEventListener('input', handler);
                        await showXinXinSuccess(currentPhrase);
                        currentStage = 'missing1';
                        currentMissingPattern = wordObj.missingPatterns[0];
                        await renderMissingStage();
                    }
                };
                inputEl.addEventListener('input', handler);
            }
        }

        async function renderMissingStage() {
            if (!gameActive) return;
            const wordObj = wordListGlobal[currentWordIndex];
            currentWordObjForHint = wordObj;
            const pattern = currentMissingPattern;
            const fullPhrase = wordObj.word;
            const meaning = wordObj.meaning;

            let elements = [];
            const patternText = pattern.patternText;
            let boxIndex = 0;
            for (let i = 0; i < patternText.length; i++) {
                const ch = patternText[i];
                if (ch === '□') {
                    elements.push(`<input type="text" maxlength="1" class="missing-letter-box" data-box-idx="${boxIndex}" data-pos="${i}" style="width:60px;" inputmode="text">`);
                    boxIndex++;
                } else {
                    const displayChar = ch === ' ' ? '&nbsp;' : escapeHtml(ch);
                    const spaceClass = ch === ' ' ? 'space-char' : '';
                    elements.push(`<span class="static-letter ${spaceClass}">${displayChar}</span>`);
                }
            }

            contentDiv.innerHTML = `
                <div class="game-play-area">
                    <div class="progress-info">🍀 第 ${currentWordIndex+1}/${wordListGlobal.length} 項 · 填空挑戰 🍀</div>
                    <div class="word-card">
                        <div class="chinese-meaning">📖 ${escapeHtml(meaning)}</div>
                        <div class="missing-word-area" id="missingBoxArea">${elements.join('')}</div>
                        <div class="action-buttons">
                            <button class="sound-btn" id="repeatMissingSound">🔊 再聽一次</button>
                            <button class="hint-btn" id="hintBtnMissing">💡 提示一下</button>
                        </div>
                        <div><button id="resetGameBtn" style="background:#a0d2aa;">🏠 重新輸入</button></div>
                    </div>
                </div>
            `;

            await speakBoth(fullPhrase, meaning);
            const boxes = document.querySelectorAll('.missing-letter-box');
            if (boxes.length === 0) return;
            boxes[0].focus();

            const boxCorrectMap = [];
            pattern.boxes.forEach((box, idx) => { if (boxes[idx]) boxCorrectMap[idx] = box.correctLetter.toLowerCase(); });

            function checkAllFilledAndCorrect() {
                let allFilled = true, allCorrect = true;
                for (let i = 0; i < boxes.length; i++) {
                    const val = boxes[i].value.trim().toLowerCase();
                    if (val === '') allFilled = false;
                    if (val !== boxCorrectMap[i]) allCorrect = false;
                }
                if (allFilled && allCorrect) {
                    for (let b of boxes) b.disabled = true;
                    handleMissingCorrect();
                }
            }

            for (let i = 0; i < boxes.length; i++) {
                const input = boxes[i];
                input.addEventListener('input', (e) => {
                    let val = e.target.value.trim().toLowerCase();
                    val = val.replace(/[^a-z]/gi, '').charAt(0);
                    e.target.value = val;
                    checkAllFilledAndCorrect();
                    if (val !== '' && i < boxes.length-1) boxes[i+1].focus();
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && input.value === '' && i > 0) boxes[i-1].focus();
                });
            }

            document.getElementById('repeatMissingSound')?.addEventListener('click', async () => {
                await speakBoth(fullPhrase, meaning);
            });
            document.getElementById('hintBtnMissing')?.addEventListener('click', () => handleHint());
            document.getElementById('resetGameBtn')?.addEventListener('click', () => resetToSetup());
        }

        async function handleMissingCorrect() {
            const wordObj = wordListGlobal[currentWordIndex];
            const currentPhrase = wordObj.word;
            await showXinXinSuccess(currentPhrase);
            if (currentStage === 'missing1') {
                currentStage = 'missing2';
                currentMissingPattern = wordObj.missingPatterns[1];
                await renderMissingStage();
            } else if (currentStage === 'missing2') {
                currentWordIndex++;
                if (currentWordIndex < wordListGlobal.length) {
                    currentStage = 'spelling';
                    await renderSpellingStage();
                } else await finishAllWords();
            }
        }

        async function finishAllWords() {
            gameActive = false;
            const originalInput = wordListGlobal.map(w => w.word).join(',');
            await showRainbowComplete(originalInput);
        }

        function resetToSetup() {
            gameActive = false;
            currentStage = 'setup';
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            let preserve = wordListGlobal.length ? wordListGlobal.map(w => w.word).join(',') : '';
            renderSetupPage(preserve);
        }

        // ---------- 設定頁面 (加入導入/導出) ----------
        function renderSetupPage(previousWords = '') {
            loadGroupsFromStorage();
            const groupsHtml = groups.map(g => `<button class="group-btn" data-group-id="${g.id}">📚 ${escapeHtml(g.name)}</button>`).join('');
            const managerListHtml = groups.map(g => `
                <div class="group-item" data-group-id="${g.id}">
                    <div class="group-info"><strong>${escapeHtml(g.name)}</strong><br><span style="font-size:0.75rem;">📖 ${escapeHtml(g.wordsString.length > 40 ? g.wordsString.substring(0,38)+'…' : g.wordsString)}</span></div>
                    <div class="group-actions">
                        <button class="edit-group" data-id="${g.id}">✏️ 編輯</button>
                        <button class="del-group" data-id="${g.id}">🗑️ 刪除</button>
                    </div>
                </div>
            `).join('');

            contentDiv.innerHTML = `
                <div class="setup-panel">
                    <div class="import-export-bar">
                        <button class="io-btn" id="exportDataBtn">📤 匯出 JSON</button>
                        <button class="io-btn" id="importDataBtn">📥 匯入 JSON</button>
                    </div>
                    <label>🌿 輸入英文單字或句子 (用逗號分隔) 🌿</label>
                    <div class="word-input-area">
                        <input type="text" id="wordListInput" placeholder="例: cat, I love you, good morning" value="${escapeHtml(previousWords)}">
                        <button id="startGameBtn">🚀 開始填空 🚀</button>
                    </div>
                    <div class="preset-group-bar">
                        <div class="preset-title">✨ 魔法字句組 ✨</div>
                        <div class="group-buttons" id="presetGroupButtons">${groupsHtml}<button class="group-btn add-group-btn" id="quickAddGroupBtn">➕ 新增組</button></div>
                    </div>
                    <div class="group-manager">
                        <div class="manager-header"><span>📋 我的單字組</span><span>✏️ 點擊編輯可改內容</span></div>
                        <div class="group-list" id="groupManagerList">${managerListHtml || '<div>暫無組別～</div>'}</div>
                        <div class="add-group-form">
                            <input type="text" id="newGroupName" placeholder="組名 (例: 水果句子)">
                            <input type="text" id="newGroupWords" placeholder="單字/句子 (逗號分隔)" value="apple pie, I am happy">
                            <button id="confirmAddGroupBtn">➕ 建立</button>
                        </div>
                    </div>
                    <div class="example-hint">💡 每個題目隨機挖空2~3個字母，空格唔變填空！可匯出/匯入資料～</div>
                </div>
            `;

            // 綁定導入導出
            document.getElementById('exportDataBtn')?.addEventListener('click', exportGroupsToJSON);
            document.getElementById('importDataBtn')?.addEventListener('click', triggerImportFile);

            document.getElementById('startGameBtn')?.addEventListener('click', () => startGame());
            const presetContainer = document.getElementById('presetGroupButtons');
            if (presetContainer) {
                presetContainer.querySelectorAll('.group-btn[data-group-id]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const groupId = parseInt(btn.dataset.groupId);
                        const group = groups.find(g => g.id === groupId);
                        if (group?.wordsString) startGame(group.wordsString);
                        else alert('此組內容無效');
                    });
                });
                document.getElementById('quickAddGroupBtn')?.addEventListener('click', () => {
                    const name = prompt("新組名稱", "我的句子組");
                    if (!name) return;
                    const words = prompt("輸入內容 (逗號分隔)", "I love you, good night");
                    if (words?.trim()) { addGroup(name, words); renderSetupPage(document.getElementById('wordListInput')?.value || ''); }
                });
            }

            const managerDiv = document.getElementById('groupManagerList');
            if (managerDiv) {
                managerDiv.querySelectorAll('.edit-group').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = parseInt(btn.dataset.id);
                        const group = groups.find(g => g.id === id);
                        if (group) {
                            const newName = prompt("編輯組名", group.name);
                            if (newName === null) return;
                            const newWords = prompt("編輯內容 (逗號分隔)", group.wordsString);
                            if (newWords === null) return;
                            if (newWords.trim()) { updateGroup(id, newName, newWords); renderSetupPage(document.getElementById('wordListInput')?.value || ''); }
                        }
                    });
                });
                managerDiv.querySelectorAll('.del-group').forEach(btn => {
                    btn.addEventListener('click', () => {
                        if (confirm("確定刪除？")) { deleteGroup(parseInt(btn.dataset.id)); renderSetupPage(document.getElementById('wordListInput')?.value || ''); }
                    });
                });
            }
            document.getElementById('confirmAddGroupBtn')?.addEventListener('click', () => {
                const name = document.getElementById('newGroupName')?.value.trim();
                const words = document.getElementById('newGroupWords')?.value.trim();
                if (!name || !words) { alert("請填寫組名和內容～"); return; }
                addGroup(name, words);
                renderSetupPage(document.getElementById('wordListInput')?.value || '');
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
        }

        // 啟動
        loadGroupsFromStorage();
        renderSetupPage('');
    })();
</script>
</body>
</html>
