<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>左定右？Left or Right? · 欣欣學左右</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(145deg, #f9e7b2 0%, #f5d0b8 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Comic Sans MS', 'Chalkboard SE', sans-serif;
      padding: 12px;  /* 稍微縮小 padding，給 iPhone 更多空間 */
    }

    .game-box {
      max-width: 700px;
      width: 100%;
      background: rgba(255, 251, 240, 0.9);
      backdrop-filter: blur(8px);
      border-radius: 56px 56px 40px 40px;
      box-shadow: 0 20px 35px rgba(180, 100, 30, 0.25), 0 8px 0 #c29a6b inset, 0 -4px 0 #fff3db inset;
      padding: 24px 18px 32px;  /* 左右內縮，更適合窄屏 */
      border: 5px solid #ffcf9a;
      text-align: center;
      transition: all 0.2s;
      overflow: hidden;  /* 防止意外溢出 */
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #7b3f00;
      text-shadow: 4px 4px 0 #ffbd7f;
      letter-spacing: 1px;
      margin-top: -5px;
      margin-bottom: 12px;
      word-break: break-word;
      line-height: 1.2;
    }

    .counter-panel {
      background: #a7d0cd;
      padding: 10px 16px;
      border-radius: 60px;
      display: inline-block;
      margin-bottom: 16px;
      box-shadow: 0 5px 0 #5f8b89, 0 2px 8px rgba(0,0,0,0.1);
      border: 2px solid #e2fffc;
    }

    .counter-panel span {
      font-size: 1.8rem;
      font-weight: bold;
      background: #fef9e3;
      padding: 4px 20px;
      border-radius: 50px;
      margin-left: 10px;
      color: #2d5e5b;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
      border: 2px solid #c0dfdc;
    }

    .word-stage {
      background: #fff6e0;
      border-radius: 50px;
      padding: 20px 8px;
      margin: 12px 0 20px;
      box-shadow: 0 10px 0 #bb8f63, 0 6px 12px rgba(0,0,0,0.15), inset 0 2px 15px #ffeecc;
      border: 3px solid #f7bc6d;
    }

    #word-display {
      font-size: 5.5rem;  /* 適中，後續有響應式 */
      font-weight: 900;
      line-height: 1.2;
      color: #3b2a1a;
      text-shadow: 5px 5px 0 #f3cd9b;
      letter-spacing: 4px;
      min-height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      word-break: break-word;
      overflow-wrap: break-word;
      padding: 0 5px;
    }

    .speak-btn {
      background: #ffb882;
      border: none;
      font-size: 2rem;
      padding: 8px 22px;
      border-radius: 60px;
      margin: 8px 0 5px;
      cursor: pointer;
      box-shadow: 0 6px 0 #b26b3f, 0 2px 8px rgba(0,0,0,0.1);
      border: 2px solid #ffeac5;
      transition: 0.05s linear;
      color: #422b1a;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      touch-action: manipulation;
    }

    .speak-btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #b26b3f, 0 2px 6px rgba(0,0,0,0.1);
    }

    /* 左右選項容器 ———— 關鍵：強制同一水平，永不換行 */
    .choices {
      display: flex;
      flex-wrap: nowrap;       /* 保證在 iPhone 豎屏也絕不折行 */
      gap: 14px;
      justify-content: center;
      margin: 18px 0 20px;
      align-items: stretch;
    }

    .choice {
      flex: 1 1 0%;           /* 均分寬度，忽略基礎尺寸，完全適應父容器 */
      min-width: 0;            /* 允許收縮 */
      padding: 24px 6px;
      font-size: 5.5rem;      /* 大箭頭，後續響應式調整 */
      font-weight: bold;
      border-radius: 40px;
      border: 5px solid #ffeac1;
      box-shadow: 0 10px 0 #7a4f2e, 0 5px 10px rgba(0,0,0,0.15);
      cursor: pointer;
      transition: 0.06s;
      background: #ffdead;
      color: #3b2a1a;
      text-shadow: 2px 2px 0 #fff2b5;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .left-choice {
      background: #b3d9ff;
      box-shadow: 0 10px 0 #5f7a9f, 0 4px 8px rgba(0,0,0,0.1);
    }

    .right-choice {
      background: #ffccb3;
      box-shadow: 0 10px 0 #b2724a, 0 4px 8px rgba(0,0,0,0.1);
    }

    .choice:active {
      transform: translateY(6px);
      box-shadow: 0 4px 0 #5f3e28, 0 4px 8px rgba(0,0,0,0.1);
    }

    .choice:disabled {
      opacity: 0.8;
      transform: translateY(5px);
      box-shadow: 0 5px 0 #5f3e28;
      cursor: not-allowed;
    }

    .banner-area {
      margin: 8px 0 5px;
      min-height: 70px;
    }

    .praise-banner {
      background: #fbbb2d;
      padding: 14px 20px;
      border-radius: 50px;
      font-size: 2.8rem;
      font-weight: 900;
      color: #a1220b;
      text-shadow: 3px 3px 0 #ffe484;
      box-shadow: 0 7px 0 #b4641c, inset 0 2px 12px #fff1b5;
      border: 3px solid #ffda88;
      letter-spacing: 6px;
      display: inline-block;
      padding-left: 28px;
      padding-right: 28px;
      animation: pop 0.3s ease;
      white-space: nowrap;
    }

    @keyframes pop {
      0% { transform: scale(0.7); opacity: 0; }
      80% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    .hidden {
      display: none !important;
    }

    .footer-note {
      margin-top: 20px;
      color: #7b4a2a;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .small-hint {
      background: #efd9c6;
      border-radius: 30px;
      padding: 6px 16px;
      display: inline-block;
    }

    button {
      user-select: none;
      -webkit-user-select: none;
    }

    /* ---------- 響應式微調：專為 iPhone 豎屏 (寬度 ≤ 430px) ---------- */
    @media (max-width: 500px) {
      .game-box { 
        padding: 20px 14px 28px; 
        border-radius: 48px 48px 36px 36px;
      }
      h1 { font-size: 1.8rem; }
      .counter-panel span { font-size: 1.6rem; padding: 2px 16px; }
      #word-display { font-size: 4.5rem; min-height: 110px; }
      .choice { 
        font-size: 4.8rem; 
        padding: 20px 4px; 
        border-radius: 36px;
      }
      .speak-btn { font-size: 1.8rem; padding: 6px 18px; }
      .praise-banner { font-size: 2.4rem; padding: 12px 20px; letter-spacing: 4px; }
    }

    /* 更小屏幕 (iPhone SE 1代, 320~375px) 進一步優化 */
    @media (max-width: 400px) {
      body { padding: 8px; }
      .game-box { padding: 16px 10px 24px; }
      h1 { font-size: 1.6rem; }
      .counter-panel { padding: 6px 12px; }
      .counter-panel span { font-size: 1.4rem; padding: 2px 12px; }
      #word-display { font-size: 3.8rem; min-height: 100px; letter-spacing: 2px; }
      .choices { gap: 10px; }
      .choice { 
        font-size: 4rem; 
        padding: 18px 2px; 
        border-radius: 30px;
        box-shadow: 0 8px 0 #7a4f2e, 0 4px 8px rgba(0,0,0,0.1);
      }
      .left-choice { box-shadow: 0 8px 0 #5f7a9f, 0 4px 6px rgba(0,0,0,0.1); }
      .right-choice { box-shadow: 0 8px 0 #b2724a, 0 4px 6px rgba(0,0,0,0.1); }
      .choice:active { transform: translateY(5px); box-shadow: 0 3px 0 #5f3e28; }
      .speak-btn { font-size: 1.5rem; padding: 5px 16px; }
      .praise-banner { font-size: 2rem; padding: 10px 16px; white-space: nowrap; }
      .footer-note { font-size: 1rem; }
    }

    /* 超小屏 (例如 iPhone 5/SE 320px) 確保箭頭仍然清晰 */
    @media (max-width: 360px) {
      .choice { font-size: 3.5rem; padding: 14px 2px; }
      #word-display { font-size: 3.2rem; }
    }

    /* 點擊/觸控反饋 */
    .choice, .speak-btn {
      transition: transform 0.08s, box-shadow 0.08s;
    }
  </style>
</head>
<body>
<div class="game-box">
  <h1>⇦ LEFT · RIGHT ⇨<br>左 · 右</h1>

  <!-- 計數器 -->
  <div class="counter-panel">
    📋 答對題數 <span id="question-counter">0</span>
  </div>

  <!-- 顯示單字區域 -->
  <div class="word-stage">
    <div id="word-display">LEFT</div>
    <button class="speak-btn" id="repeat-word-btn" title="聽多次 / listen again">🔊 聽下</button>
  </div>

  <!-- 左右選擇按鈕 (同一水平，只用箭頭) -->
  <div class="choices">
    <button class="choice left-choice" id="left-btn">←</button>
    <button class="choice right-choice" id="right-btn">→</button>
  </div>

  <!-- 獎勵橫幅 欣欣叻叻 -->
  <div class="banner-area" id="banner-area">
    <div id="praise-banner" class="praise-banner hidden">🌸 欣欣叻叻 🌸</div>
  </div>

  <!-- 提示 -->
  <div class="footer-note">
    <span class="small-hint">㩒左邊定右邊？ Click the box!</span>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- 遊戲狀態 ----------
    const wordList = ['left', 'right', '左', '右'];
    let currentWord = 'left';          
    let correctSide = 'left';          
    let questionsAnswered = 0;         
    let canAnswer = true;             
    let nextQuestionTimer = null;
    let bannerHideTimer = null;

    // ---------- DOM 元素 ----------
    const wordDisplay = document.getElementById('word-display');
    const counterSpan = document.getElementById('question-counter');
    const leftBtn = document.getElementById('left-btn');
    const rightBtn = document.getElementById('right-btn');
    const repeatBtn = document.getElementById('repeat-word-btn');
    const praiseBanner = document.getElementById('praise-banner');

    // ---------- 語音合成 ----------
    const synth = window.speechSynthesis;
    let voices = [];
    let britishVoice = null;
    let cantoneseVoice = null;

    function loadVoices() {
      voices = synth.getVoices();
      britishVoice = voices.find(voice => 
        voice.lang === 'en-GB' || (voice.lang.startsWith('en-') && voice.name.includes('British'))
      );
      if (!britishVoice) {
        britishVoice = voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en-'));
      }
      
      cantoneseVoice = voices.find(voice => 
        voice.lang === 'zh-HK' || voice.lang === 'yue' || voice.lang === 'zh-yue' || 
        (voice.lang.startsWith('zh') && voice.name.includes('Hong Kong'))
      );
      if (!cantoneseVoice) {
        cantoneseVoice = voices.find(v => v.lang === 'zh-HK') || voices.find(v => v.lang === 'zh-TW') || voices.find(v => v.lang.startsWith('zh'));
      }
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = loadVoices;
    }
    loadVoices();

    function stopSpeaking() {
      if (synth.speaking) {
        synth.cancel();
      }
    }

    function speakText(text, langType) {
      return new Promise((resolve) => {
        if (!synth) { resolve(); return; }
        stopSpeaking();
        
        const utterance = new SpeechSynthesisUtterance(text);
        
        if (langType === 'en-GB') {
          utterance.lang = 'en-GB';
          if (britishVoice) utterance.voice = britishVoice;
        } else if (langType === 'yue') {
          utterance.lang = 'zh-HK';
          if (cantoneseVoice) utterance.voice = cantoneseVoice;
        }
        
        utterance.rate = 0.9;
        utterance.pitch = 1.1;
        utterance.volume = 1;
        
        utterance.onend = () => resolve();
        utterance.onerror = () => resolve();
        
        synth.speak(utterance);
      });
    }

    async function speakCurrentWord() {
      const word = currentWord;
      let lang = (word === 'left' || word === 'right') ? 'en-GB' : 'yue';
      await speakText(word, lang);
    }

    async function speakPraise() {
      await speakText('欣欣叻叻', 'yue');
    }

    async function showPraiseAndCelebrate() {
      praiseBanner.classList.remove('hidden');
      await speakPraise();
      if (bannerHideTimer) clearTimeout(bannerHideTimer);
      bannerHideTimer = setTimeout(() => {
        praiseBanner.classList.add('hidden');
      }, 2500);
    }

    function updateCounterDisplay() {
      counterSpan.textContent = questionsAnswered;
    }

    function getCorrectSideFromWord(word) {
      return (word === 'left' || word === '左') ? 'left' : 'right';
    }

    async function loadNewQuestion() {
      if (nextQuestionTimer) clearTimeout(nextQuestionTimer);
      
      const randomIndex = Math.floor(Math.random() * wordList.length);
      currentWord = wordList[randomIndex];
      correctSide = getCorrectSideFromWord(currentWord);
      
      wordDisplay.textContent = currentWord;
      
      canAnswer = true;
      leftBtn.disabled = false;
      rightBtn.disabled = false;
      
      stopSpeaking();
      // 為了更貼近 iOS 自動播放政策，延遲朗讀，但依然會觸發（用戶首次點擊按鈕後才真正有聲）
      // 這裡保留自動朗讀，若被瀏覽器阻止也無傷大雅，用戶可按喇叭。
      setTimeout(() => { speakCurrentWord(); }, 60);
    }

    async function handleAnswer(selectedSide) {
      if (!canAnswer) return;
      if (!currentWord) return;
      
      canAnswer = false;
      leftBtn.disabled = true;
      rightBtn.disabled = true;
      
      if (selectedSide === correctSide) {
        questionsAnswered += 1;
        updateCounterDisplay();
        stopSpeaking();
        await showPraiseAndCelebrate();
        
        if (nextQuestionTimer) clearTimeout(nextQuestionTimer);
        nextQuestionTimer = setTimeout(() => {
          loadNewQuestion();
          nextQuestionTimer = null;
        }, 800);
        
      } else {
        // 答錯：輕輕晃動提示
        wordDisplay.style.transition = '0.1s';
        wordDisplay.style.transform = 'translateX(6px)';
        setTimeout(() => wordDisplay.style.transform = 'translateX(-6px)', 50);
        setTimeout(() => wordDisplay.style.transform = 'translateX(3px)', 100);
        setTimeout(() => wordDisplay.style.transform = 'translateX(0)', 150);
        
        stopSpeaking();
        const utterance = new SpeechSynthesisUtterance('Try again');
        utterance.lang = 'en-GB';
        if (britishVoice) utterance.voice = britishVoice;
        synth.speak(utterance);
        
        canAnswer = true;
        leftBtn.disabled = false;
        rightBtn.disabled = false;
        
        if (nextQuestionTimer) {
          clearTimeout(nextQuestionTimer);
          nextQuestionTimer = null;
        }
      }
    }

    leftBtn.addEventListener('click', () => handleAnswer('left'));
    rightBtn.addEventListener('click', () => handleAnswer('right'));
    
    repeatBtn.addEventListener('click', () => {
      if (!currentWord) return;
      stopSpeaking();
      speakCurrentWord();
    });
    
    window.addEventListener('keydown', (e) => {
      if (!canAnswer) return;
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        leftBtn.click();
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        rightBtn.click();
      } else if (e.key === ' ' || e.key === 'Space') {
        e.preventDefault();
        repeatBtn.click();
      }
    });

    function initGame() {
      questionsAnswered = 0;
      updateCounterDisplay();
      if (voices.length === 0) {
        setTimeout(() => { loadVoices(); loadNewQuestion(); }, 100);
      } else {
        loadNewQuestion();
      }
      praiseBanner.classList.add('hidden');
    }
    
    initGame();

    window.addEventListener('beforeunload', () => {
      if (synth.speaking) synth.cancel();
    });
  })();
</script>
</body>
</html>
